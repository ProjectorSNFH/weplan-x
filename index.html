<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weplanner 위플래너 - 온라인 플래너</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="refresh-loader">
        <div class="spinner"></div>
        <div style="font-weight: 600; color: var(--primary-color);">로컬 스토리지 데이터 불러오는 중...</div>
    </div>

    <div class="container">
        <header>
            <div class="nav-controls">
                <button class="btn-nav" onclick="changeWeek(-1)">&lt;</button>
                <h2 id="week-title">2026년 06월</h2>
                <button class="btn-nav" onclick="changeWeek(1)">&gt;</button>
                <button class="btn" id="btn-add-mode" onclick="toggleSelectionMode()">+ 공부 추가</button>
            </div>

            <div class="io-controls">
                <div class="dropdown-wrapper" id="auth-area"></div>

                <div class="dropdown-wrapper">
                    <button class="btn-secondary" onclick="toggleDropdown('io-dropdown', event)">내보내기/열기</button>
                    <div class="dropdown-menu" id="io-dropdown">
                        <div class="dropdown-item" onclick="exportData()">내보내기 (JSON 파일)</div>
                        <div class="dropdown-item" onclick="triggerImport()">불러오기 (JSON 파일)</div>
                    </div>
                </div>

                <input type="file" id="import-file" style="display:none;" onchange="importData(event)" accept=".json">

                <div class="status-panel" id="save-panel">
                    <svg class="progress-svg">
                        <circle class="progress-bg" cx="30" cy="30" r="27.5" />
                        <circle class="progress-bar" id="save-bar" cx="30" cy="30" r="27.5" />
                    </svg>
                    <div class="status-text" id="save-text">대기 중...</div>
                </div>
                <div class="status-panel" id="load-panel">
                    <svg class="progress-svg">
                        <circle class="progress-bg" cx="30" cy="30" r="27.5" />
                        <circle class="progress-bar" id="load-bar" cx="30" cy="30" r="27.5" />
                    </svg>
                    <div class="status-text" id="load-text">대기 중...</div>
                </div>
            </div>
        </header>

        <div id="selection-banner" class="info-banner"></div>

        <div class="grid-wrapper">
            <div class="time-axis" id="time-axis"></div>
            <div class="week-grid" id="week-grid"></div>
        </div>
        <div class="todo-section">
            <div class="todo-axis-spacer"></div>
            <div class="todo-grid" id="todo-grid"></div>
        </div>
    </div>

    <div id="modal-auth" class="modal-overlay" onclick="handleAuthOutsideClick(event)">
        <div class="modal-card auth-modal-card" id="auth-modal-card" onclick="event.stopPropagation()">
            <button class="modal-close" id="auth-close-btn" onclick="closeAuthModal()">×</button>
            <div class="modal-title" id="auth-main-title" style="font-size: 20px; margin-bottom: 5px;">로그인</div>

            <div class="auth-slider-container" id="auth-slider-container">
                <div class="auth-slider" id="auth-slider">
                    <div class="auth-pane" id="pane-login">
                        <div class="form-group">
                            <label>아이디</label>
                            <input type="text" id="log-id" placeholder="아이디 입력"
                                onkeypress="handleEnter(event, 'login')">
                        </div>
                        <div class="form-group">
                            <label>비밀번호</label>
                            <input type="password" id="log-pw" placeholder="비밀번호 입력"
                                onkeypress="handleEnter(event, 'login')">
                        </div>
                        <div class="validation-msg v-err" id="log-msg"></div>
                        <button class="btn" style="width:100%; margin-top:5px; padding: 12px;" id="btn-login"
                            onclick="submitLogin()">→</button>
                        <div class="switch-text" onclick="slideAuth('signup')">회원가입 하러가기</div>
                    </div>

                    <div class="auth-pane" id="pane-signup">
                        <div class="form-group">
                            <label>사용자명 (10자 이내)</label>
                            <input type="text" id="reg-name" placeholder="표시될 이름" oninput="validateReg()">
                        </div>
                        <div class="form-group">
                            <label>아이디 (4자 이상)</label>
                            <input type="text" id="reg-id" placeholder="사용할 아이디" oninput="validateReg()">
                        </div>
                        <div class="form-group">
                            <label>비밀번호 (8자 이상)</label>
                            <input type="password" id="reg-pw" placeholder="비밀번호" oninput="validateReg()">
                        </div>
                        <div class="form-group">
                            <label>비밀번호 확인</label>
                            <input type="password" id="reg-pw2" placeholder="비밀번호 재입력" oninput="validateReg()">
                        </div>
                        <div class="validation-msg" id="reg-msg"></div>
                        <button class="btn" style="width:100%; margin-top:5px; padding: 12px;" id="btn-signup"
                            onclick="submitSignup()" disabled>→</button>
                        <div class="switch-text" onclick="slideAuth('login')">로그인으로 돌아가기</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-planner" class="modal-overlay" onclick="handleOutsideClick(event, 'modal-planner')">
        <div class="modal-card" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal('modal-planner')">×</button>
            <div class="modal-title" id="modal-main-title">공부 기록하기</div>

            <div id="step-1-view">
                <div class="form-group" style="text-align: center; margin: 10px 0;">
                    <p style="font-size: 13px; color: var(--text-muted);">선택된 시간 대역</p>
                    <p id="selected-time-range-text"
                        style="font-size: 18px; font-weight: 700; color: var(--primary-color); margin-top:4px;"></p>
                </div>
                <div style="display: flex; gap: 8px; margin-top: 20px;">
                    <button class="btn btn-secondary" style="flex:1;" onclick="reselectTime()">다시 선택</button>
                    <button class="btn" style="flex:1;" id="btn-step1-next" onclick="goToStep2()">다음</button>
                </div>
            </div>

            <div id="step-2-view" style="display: none;">
                <div class="form-group"><label>컬러 지정</label>
                    <div class="color-picker-grid" id="color-picker-grid"></div>
                </div>
                <div class="form-group"><label>공부 제목</label><input type="text" id="input-title"
                        placeholder="예: 수학 모의고사 풀이"></div>
                <div class="form-group"><label>상세 내용</label><textarea id="input-content" rows="3"
                        placeholder="기록할 메모 사항"></textarea></div>
                <div class="modal-footer"><button class="btn" onclick="saveEvent()">완료</button></div>
            </div>
        </div>
    </div>

    <div id="modal-detail" class="modal-overlay" onclick="closeModal('modal-detail')">
        <div class="modal-card" id="detail-card" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal('modal-detail')">×</button>
            <div class="modal-title" id="detail-title" style="font-size: 18px;">공부 항목</div>
            <div style="font-size: 13px; font-weight: 600; text-align: center; color: var(--text-muted);"
                id="detail-time">00:00 ~ 00:00</div>
            <hr style="border: none; border-top: 1px solid rgba(0,0,0,0.1); margin: 8px 0;">
            <div class="form-group">
                <label>상세 기록 사항</label>
                <div id="detail-content"
                    style="font-size: 13px; min-height: 60px; background: rgba(0,0,0,0.02); padding: 8px; border-radius: 6px; white-space: pre-wrap;">
                </div>
            </div>
        </div>
    </div>

    <div id="modal-delete" class="modal-overlay">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div class="modal-title">정말로 삭제하시겠습니까?</div>
            <div style="display: flex; gap: 8px; margin-top: 15px;">
                <button class="btn btn-secondary" style="flex:1;" onclick="closeModal('modal-delete')">취소</button>
                <button class="btn" style="flex:1; background-color: var(--danger-color);"
                    onclick="confirmDelete()">삭제</button>
            </div>
        </div>
    </div>

    <div class="context-menu" id="context-menu">
        <div class="context-menu-item" onclick="handleContextAction('adjust')">기간 조정</div>
        <div class="context-menu-item" onclick="handleContextAction('edit')">내용 변경</div>
        <div class="context-menu-item delete" onclick="handleContextAction('delete')">삭제</div>
    </div>

    <div class="toast" id="toast">오류 발생</div>

    <script src="script.js"></script>
</body>

</html>
